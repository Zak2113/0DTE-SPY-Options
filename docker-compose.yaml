version: '3.8'

services:
  terminal-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spy-terminal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_DATA_BASE_URL=/api/secure-data
      # Since we are mounting 'spy_options' directly as the root of /app/market_data,
      # we change this variable back to the base directory!
      - SERVER_DATA_DIR=/app/market_data
    volumes:
      # BIND MOUNT: Maps the raw host path straight into the container
      - /var/lib/docker/volumes/a40wc8k0oog8c8kowk0wgsgo_bot-data/_data/spy_options:/app/market_data
    networks:
      - coolify

# We leave the bottom volumes block ENTIRELY EMPTY now, 
# because bind mounts do not need to be declared here!
volumes: {}

networks:
  coolify:
    external: true